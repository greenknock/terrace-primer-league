<!DOCTYPE html>
<html>
<head>
<title>Terrace IPL</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

h1{
font-size:28px;
margin-bottom:20px;
}

h2{
font-size:20px;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

button{
padding:12px;
width:100%;
margin-top:10px;
border:none;
background:#3b82f6;
color:white;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#2563eb;
}

input,select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:none;
background:#111827;
color:white;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
text-align:center;
border-bottom:1px solid #334155;
}

.page{
display:none;
}

.active{
display:block;
}

.team-card{
background:#111827;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

.player{
cursor:pointer;
padding:5px;
}

.selected{
background:#2563eb;
}

</style>
</head>

<body>

<div class="container">

<h1>Terrace IPL</h1>

<div id="dashboard" class="page active">

<div class="grid">

<div class="card">

<h2>Points Table</h2>

<table id="pointsTable">
<thead>
<tr>
<th>Team</th>
<th>P</th>
<th>W</th>
<th>L</th>
<th>Pts</th>
<th>RF</th>
<th>RA</th>
<th>NRR</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<div class="card">

<h2>Actions</h2>

<button onclick="openPage('teamsPage')">View Teams</button>

<button onclick="openPage('startMatch')">Start Match</button>

</div>

</div>

<div class="card">

<h2>Match History</h2>

<ul id="history"></ul>

</div>

</div>

<div id="teamsPage" class="page">

<div class="card">

<h2>Teams</h2>

<div id="teamList"></div>

<button onclick="openPage('dashboard')">Back</button>

</div>

</div>

<div id="startMatch" class="page">

<div class="card">

<h2>Select Teams</h2>

<select id="teamA"></select>
<select id="teamB"></select>

<button onclick="startPlayingSelection()">Next</button>

</div>

</div>

<div id="playingSelect" class="page">

<div class="card">

<h2>Select Playing 3</h2>

<h3 id="teamATitle"></h3>
<div id="playersA"></div>

<h3 id="teamBTitle"></h3>
<div id="playersB"></div>

<button onclick="startToss()">Next</button>

</div>

</div>

<div id="tossPage" class="page">

<div class="card">

<h2>Toss</h2>

<select id="tossWinner"></select>

<select id="decision">
<option value="bat">Bat</option>
<option value="bowl">Bowl</option>
</select>

<button onclick="startMatch()">Start Match</button>

</div>

</div>

<div id="liveMatch" class="page">

<div class="card">

<h2 id="scoreboard"></h2>

<p id="overs"></p>

</div>

<div class="card">

<label>Runs this over</label>
<input id="runsOver" type="number">

<label>Wickets</label>
<input id="wktsOver" type="number">

<button onclick="updateOver()">Update Over</button>

<button onclick="endInnings()">End Innings</button>

</div>

</div>

<div id="scorecardPage" class="page">

<div class="card">

<h2>Scorecard</h2>

<div id="scorecard"></div>

<button onclick="openPage('dashboard')">Back</button>

</div>

</div>

</div>

<script>

const teams=[
{name:"Mumbai Indians",players:["Rohit Sharma","Ryan Rickelton","Tilak Varma","Hardik Pandya","Sherfane Rutherford","Naman Dhir","Shardul Thakur"]},
{name:"Chennai Super Kings",players:["Sanju Samson","Ruturaj Gaikwad","Ayush Mhatre","Matthew Short","Shivam Dube","Kartik Sharma","Jamie Overton"]},
{name:"Delhi Capitals",players:["KL Rahul","Axar Patel","Tristan Stubbs","David Miller","Nitish Rana","Ashutosh Sharma","Abishek Porel"]},
{name:"Royal Challengers Bengaluru",players:["Virat Kohli","Philip Salt","Rajat Patidar","Jitesh Sharma","Tim David","Romario Shepherd","Krunal Pandya"]},
{name:"Kolkata Knight Riders",players:["Finn Allen","Ajinkya Rahane","Cameron Green","Rinku Singh","Angkrish Raghuvanshi","Ramandeep Singh","Anukul Roy","Sunil Narine"]},
{name:"Punjab Kings",players:["Prabhsimran Singh","Shreyas Iyer","Cooper Connolly","Nehal Wadhera","Shashank Singh","Marco Jansen","Marcus Stoinis"]},
{name:"Lucknow Super Giants",players:["Rishabh Pant","Aiden Markram","Mitchell Marsh","Nicholas Pooran","Ayush Badoni","Abdul Samad","Shahbaz Ahmed"]},
{name:"Sunrisers Hyderabad",players:["Abhishek Sharma","Travis Head","Ishan Kishan","Heinrich Klaasen","Nitish Kumar Reddy","Aniket Verma"]},
{name:"Gujarat Titans",players:["Shubman Gill","Jos Buttler","Glenn Phillips","Rahul Tewatia","Rashid Khan","Washington Sundar","Sai Sudharsan"]},
{name:"Rajasthan Royals",players:["Yashasvi Jaiswal","Riyan Parag","Vaibhav Sooryavanshi","Dhruv Jurel","Shimron Hetmyer","Ravindra Jadeja",]}
]
  
let match={}

function openPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

function renderTeams(){
let div=document.getElementById("teamList")
div.innerHTML=""

teams.forEach(t=>{
let d=document.createElement("div")
d.className="team-card"
d.innerHTML="<b>"+t.name+"</b><br>"+t.players.join(", ")
div.appendChild(d)
})
}

function renderPoints(){

let tbody=document.querySelector("#pointsTable tbody")
tbody.innerHTML=""

teams.forEach(t=>{

let nrr=0

if(t.stats.rf>0||t.stats.ra>0){

let forRate=t.stats.rf/10
let againstRate=t.stats.ra/10
nrr=(forRate-againstRate).toFixed(2)

}

tbody.innerHTML+=`
<tr>
<td>${t.name}</td>
<td>${t.stats.p}</td>
<td>${t.stats.w}</td>
<td>${t.stats.l}</td>
<td>${t.stats.pts}</td>
<td>${t.stats.rf}</td>
<td>${t.stats.ra}</td>
<td>${nrr}</td>
</tr>`
})
}

function populateTeamSelect(){

let a=document.getElementById("teamA")
let b=document.getElementById("teamB")

teams.forEach((t,i)=>{

a.innerHTML+=`<option value="${i}">${t.name}</option>`
b.innerHTML+=`<option value="${i}">${t.name}</option>`

})

}

let playingA=[]
let playingB=[]

function startPlayingSelection(){

let a=teamA.value
let b=teamB.value

match.teamA=teams[a]
match.teamB=teams[b]

document.getElementById("teamATitle").innerText=match.teamA.name
document.getElementById("teamBTitle").innerText=match.teamB.name

renderPlayerSelect()

openPage("playingSelect")

}

function renderPlayerSelect(){

playersA.innerHTML=""
playersB.innerHTML=""

match.teamA.players.forEach(p=>{

let d=document.createElement("div")
d.className="player"
d.innerText=p

d.onclick=()=>togglePlayer(d,playingA,3)

playersA.appendChild(d)

})

match.teamB.players.forEach(p=>{

let d=document.createElement("div")
d.className="player"
d.innerText=p

d.onclick=()=>togglePlayer(d,playingB,3)

playersB.appendChild(d)

})

}

function togglePlayer(el,list,max){

let name=el.innerText

if(list.includes(name)){

list.splice(list.indexOf(name),1)
el.classList.remove("selected")

}else{

if(list.length>=max)return

list.push(name)
el.classList.add("selected")

}

}

function startToss(){

tossWinner.innerHTML=`
<option>${match.teamA.name}</option>
<option>${match.teamB.name}</option>
`

openPage("tossPage")

}

let innings=1
let scoreA=0
let scoreB=0
let wickets=0
let over=0

function startMatch(){

openPage("liveMatch")

updateScore()

}

function updateOver(){

let r=parseInt(runsOver.value)||0
let w=parseInt(wktsOver.value)||0

if(innings===1){

scoreA+=r

}else{

scoreB+=r

}

wickets+=w
over++

runsOver.value=""
wktsOver.value=""

updateScore()

}

function updateScore(){

let score=innings===1?scoreA:scoreB

scoreboard.innerText=`${score}/${wickets}`

overs.innerText=`Overs ${over} / 10`

}

function endInnings(){

if(innings===1){

innings=2
wickets=0
over=0

}else{

finishMatch()

}

}

function finishMatch(){

match.teamA.stats.p++
match.teamB.stats.p++

match.teamA.stats.rf+=scoreA
match.teamA.stats.ra+=scoreB

match.teamB.stats.rf+=scoreB
match.teamB.stats.ra+=scoreA

let result=""

if(scoreA>scoreB){

match.teamA.stats.w++
match.teamB.stats.l++

match.teamA.stats.pts+=2

result=`${match.teamA.name} beat ${match.teamB.name}`

}else{

match.teamB.stats.w++
match.teamA.stats.l++

match.teamB.stats.pts+=2

result=`${match.teamB.name} beat ${match.teamA.name}`

}

history.innerHTML+=`<li>${result}</li>`

renderPoints()

showScorecard()

}

function showScorecard(){

scorecard.innerHTML=`

${match.teamA.name} ${scoreA}/3<br>
${match.teamB.name} ${scoreB}/3

`

openPage("scorecardPage")

}

renderTeams()
renderPoints()
populateTeamSelect()

</script>

</body>

</html>
