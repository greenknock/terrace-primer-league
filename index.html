<!DOCTYPE html>
<html>
<head>
<title>Terrace Premier League</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:20px;
font-size:24px;
font-weight:bold;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.5);
margin-bottom:20px;
}

button{
padding:12px;
border:none;
background:#3b82f6;
color:white;
border-radius:8px;
font-weight:bold;
cursor:pointer;
width:100%;
margin-top:10px;
}

button:hover{
background:#2563eb;
}

input,select{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:10px;
border-radius:8px;
border:none;
background:#020617;
color:white;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
text-align:center;
}

th{
background:#020617;
color:#94a3b8;
}

tr{
border-bottom:1px solid #334155;
}

.page{
display:none;
}

.page.active{
display:block;
}

.team{
padding:10px;
background:#020617;
margin:5px;
border-radius:6px;
}

.player{
margin:4px;
}

.score{
font-size:28px;
font-weight:bold;
}

</style>

</head>

<body>

<header>Terrace Premier League</header>

<div class="container">

<div id="dashboard" class="page active">

<div class="grid">

<div class="card">
<h2>Points Table</h2>

<table id="pointsTable">
<thead>
<tr>
<th>Team</th>
<th>P</th>
<th>W</th>
<th>L</th>
<th>Pts</th>
<th>RF</th>
<th>RA</th>
<th>NRR</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<div class="card">

<h2>Actions</h2>

<button onclick="showPage('startMatch')">Start Match</button>

<button onclick="showPage('teamsPage')">View Teams</button>

</div>

</div>

<div class="card">

<h2>Match History</h2>

<ul id="history"></ul>

</div>

</div>


<div id="teamsPage" class="page">

<div class="card">

<h2>Create Teams</h2>

<input id="teamName" placeholder="Team Name">

<textarea id="players" placeholder="11 players separated by comma"></textarea>

<button onclick="addTeam()">Add Team</button>

</div>

<div id="teamList"></div>

<button onclick="showPage('dashboard')">Back</button>

</div>



<div id="startMatch" class="page">

<div class="card">

<h2>Select Teams</h2>

<select id="teamA"></select>
<select id="teamB"></select>

<button onclick="choosePlayers()">Next</button>

</div>

</div>



<div id="playersPage" class="page">

<div class="card">

<h2>Select Playing 3</h2>

<div id="playersA"></div>

<div id="playersB"></div>

<button onclick="tossPage()">Next</button>

</div>

</div>



<div id="tossPage" class="page">

<div class="card">

<h2>Toss</h2>

<select id="tossWinner"></select>

<select id="decision">
<option value="bat">Bat</option>
<option value="bowl">Bowl</option>
</select>

<button onclick="startLive()">Start Match</button>

</div>

</div>



<div id="livePage" class="page">

<div class="card">

<div id="scoreboard" class="score"></div>

<div id="overs"></div>

</div>

<div class="card">

Runs this over
<input id="runs">

Wickets
<input id="wkts">

<button onclick="updateOver()">Update Over</button>

<button onclick="endInnings()">End Innings</button>

</div>

</div>

</div>

<script>

let teams=JSON.parse(localStorage.getItem("teams")||"[]")
let table=JSON.parse(localStorage.getItem("table")||"[]")
let history=JSON.parse(localStorage.getItem("history")||"[]")

let match={}

function save(){
localStorage.setItem("teams",JSON.stringify(teams))
localStorage.setItem("table",JSON.stringify(table))
localStorage.setItem("history",JSON.stringify(history))
}

function showPage(p){

document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"))
document.getElementById(p).classList.add("active")

}

function addTeam(){

let name=document.getElementById("teamName").value
let players=document.getElementById("players").value.split(",")

teams.push({name,players})

table.push({
name,
played:0,
win:0,
loss:0,
points:0,
rf:0,
ra:0
})

save()

renderTeams()
renderTable()

}

function renderTeams(){

let div=document.getElementById("teamList")
div.innerHTML=""

teams.forEach(t=>{

let d=document.createElement("div")
d.className="card"

let html="<h3>"+t.name+"</h3>"

t.players.forEach(p=>{

html+="<div class='player'>"+p+"</div>"

})

d.innerHTML=html

div.appendChild(d)

})

}

function renderTable(){

let tbody=document.querySelector("#pointsTable tbody")
tbody.innerHTML=""

table.forEach(t=>{

let nrr=(t.rf/10)-(t.ra/10)

let row=

`<tr>
<td>${t.name}</td>
<td>${t.played}</td>
<td>${t.win}</td>
<td>${t.loss}</td>
<td>${t.points}</td>
<td>${t.rf}</td>
<td>${t.ra}</td>
<td>${nrr.toFixed(2)}</td>
</tr>`

tbody.innerHTML+=row

})

}

function choosePlayers(){

let a=document.getElementById("teamA").value
let b=document.getElementById("teamB").value

match.teamA=a
match.teamB=b

showPage("playersPage")

}

function tossPage(){

match.playA=[]
match.playB=[]

document.querySelectorAll(".pA:checked").forEach(x=>match.playA.push(x.value))
document.querySelectorAll(".pB:checked").forEach(x=>match.playB.push(x.value))

showPage("tossPage")

}

function startLive(){

match.bat=document.getElementById("tossWinner").value
match.score=0
match.wkts=0
match.over=0
match.innings=1

showPage("livePage")

updateBoard()

}

function updateBoard(){

document.getElementById("scoreboard").innerText=

match.bat+" "+match.score+"/"+match.wkts

document.getElementById("overs").innerText=

"Overs "+match.over+"/10"

}

function updateOver(){

let r=parseInt(document.getElementById("runs").value||0)
let w=parseInt(document.getElementById("wkts").value||0)

match.score+=r
match.wkts+=w
match.over++

updateBoard()

}

function endInnings(){

if(match.innings==1){

match.firstScore=match.score
match.innings=2
match.score=0
match.wkts=0
match.over=0

match.bat=match.teamA==match.bat?match.teamB:match.teamA

updateBoard()

}else{

finishMatch()

}

}

function finishMatch(){

let winner=

match.score>match.firstScore
?match.bat
:match.bat==match.teamA?match.teamB:match.teamA

history.push(

match.teamA+" vs "+match.teamB+" winner "+winner

)

table.forEach(t=>{

if(t.name==winner){

t.win++
t.points+=2

}

if(t.name==match.teamA||t.name==match.teamB){

t.played++

}

})

save()

renderTable()

showPage("dashboard")

}

function loadTeams(){

let a=document.getElementById("teamA")
let b=document.getElementById("teamB")

a.innerHTML=""
b.innerHTML=""

teams.forEach(t=>{

a.innerHTML+=`<option>${t.name}</option>`
b.innerHTML+=`<option>${t.name}</option>`

})

let toss=document.getElementById("tossWinner")

toss.innerHTML=

`<option>${teams[0]?.name}</option>
<option>${teams[1]?.name}</option>`

}

function renderHistory(){

let ul=document.getElementById("history")

ul.innerHTML=""

history.forEach(h=>{

let li=document.createElement("li")
li.innerText=h
ul.appendChild(li)

})

}

renderTeams()
renderTable()
renderHistory()
loadTeams()

</script>

</body>

</html>
