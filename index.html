<!DOCTYPE html>
<html>
<head>
<title>Terrace Premier League</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0f172a;
color:white;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

h1{
font-size:32px;
margin-bottom:20px;
}

h2{
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:14px;
box-shadow:0 6px 20px rgba(0,0,0,0.5);
margin-bottom:20px;
}

button{
width:100%;
padding:16px;
margin-top:10px;
border:none;
border-radius:12px;
background:#3b82f6;
color:white;
font-weight:bold;
font-size:16px;
cursor:pointer;
transition:.2s;
}

button:hover{
background:#2563eb;
transform:scale(1.05);
}

input,select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
background:#111827;
font-size:12px;
color:#9ca3af;
padding:10px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #334155;
}

.page{
display:none;
}

.active{
display:block;
}

.team-card{
background:#111827;
padding:15px;
margin-top:10px;
border-radius:10px;
}

.player{
padding:6px;
cursor:pointer;
}

.selected{
background:#2563eb;
border-radius:6px;
}

.scoreboard{
font-size:28px;
font-weight:bold;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h1>Terrace Premier League</h1>

<!-- DASHBOARD -->

<div id="home" class="page active">

<div class="grid">

<div class="card">

<h2>Points Table</h2>

<table id="pointsTable">
</table>

</div>

<div class="card">

<h2>Actions</h2>

<button onclick="showPage('start')">Start New Match</button>
<button onclick="showPage('teams')">View Teams</button>
<button onclick="showPage('history')">Match History</button>

</div>

</div>

</div>

<!-- TEAMS -->

<div id="teams" class="page">

<div class="card">

<h2>Teams</h2>

<div id="teamList"></div>

</div>

<button onclick="showPage('home')">Back</button>

</div>

<!-- START MATCH -->

<div id="start" class="page">

<div class="card">

<h2>Select Teams</h2>

<select id="teamA"></select>
<select id="teamB"></select>

<button onclick="selectPlayers()">Next</button>

</div>

<button onclick="showPage('home')">Back</button>

</div>

<!-- PLAYER SELECT -->

<div id="players" class="page">

<div class="card">

<h2>Select Playing 3</h2>

<div id="playersA"></div>

<div id="playersB"></div>

<button onclick="startToss()">Next</button>

</div>

</div>

<!-- TOSS -->

<div id="toss" class="page">

<div class="card">

<h2>Toss</h2>

<select id="tossWinner"></select>

<select id="decision">
<option>Bat</option>
<option>Bowl</option>
</select>

<button onclick="startMatch()">Start Match</button>

</div>

</div>

<!-- LIVE MATCH -->

<div id="live" class="page">

<div class="card">

<div id="score" class="scoreboard"></div>

<div id="overs"></div>

</div>

<div class="card">

<label>Runs this over</label>
<input type="number" id="runsOver">

<label>Wickets this over</label>
<input type="number" id="wktsOver">

<button onclick="updateOver()">Update Over</button>

<button onclick="endInnings()">End Innings</button>

</div>

</div>

<!-- HISTORY -->

<div id="history" class="page">

<div class="card">

<h2>Match History</h2>

<ul id="matchHistory"></ul>

</div>

<button onclick="showPage('home')">Back</button>

</div>

</div>

<script>

let teams=[
{name:"Mumbai",players:["Rohit","Aarush","Kabir","Dev","Aryan","Jay","Sam","Rishi","Karan","Manav","Harsh"]},
{name:"Chennai",players:["Rahul","Dev","Yash","Nikhil","Raj","Arjun","Virat","Aman","Sahil","Kunal","Rajat"]},
{name:"Delhi",players:["A","B","C","D","E","F","G","H","I","J","K"]},
{name:"Bangalore",players:["A","B","C","D","E","F","G","H","I","J","K"]},
{name:"Kolkata",players:["A","B","C","D","E","F","G","H","I","J","K"]},
{name:"Punjab",players:["A","B","C","D","E","F","G","H","I","J","K"]},
{name:"Lucknow",players:["A","B","C","D","E","F","G","H","I","J","K"]},
{name:"Hyderabad",players:["A","B","C","D","E","F","G","H","I","J","K"]},
{name:"Gujarat",players:["A","B","C","D","E","F","G","H","I","J","K"]},
{name:"Rajasthan",players:["A","B","C","D","E","F","G","H","I","J","K"]}
]

let table={}

teams.forEach(t=>{
table[t.name]={played:0,wins:0,loss:0,points:0,runsFor:0,runsAgainst:0,oversFaced:0,oversBowled:0}
})

let match={}
let history=[]

function showPage(id){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById(id).classList.add("active")

renderTable()
renderTeams()
renderHistory()

}

function renderTable(){

let html="<tr><th>Team</th><th>P</th><th>W</th><th>L</th><th>Pts</th><th>RF</th><th>RA</th><th>NRR</th></tr>"

for(let t in table){

let d=table[t]

let nrr=((d.runsFor/(d.oversFaced||1))-(d.runsAgainst/(d.oversBowled||1))).toFixed(2)

html+=`<tr>
<td>${t}</td>
<td>${d.played}</td>
<td>${d.wins}</td>
<td>${d.loss}</td>
<td>${d.points}</td>
<td>${d.runsFor}</td>
<td>${d.runsAgainst}</td>
<td>${nrr}</td>
</tr>`

}

document.getElementById("pointsTable").innerHTML=html

}

function renderTeams(){

let div=document.getElementById("teamList")

div.innerHTML=""

teams.forEach(t=>{

let card=document.createElement("div")

card.className="team-card"

card.innerHTML=`<b>${t.name}</b><br>${t.players.join(", ")}`

div.appendChild(card)

})

}

function renderHistory(){

let ul=document.getElementById("matchHistory")

ul.innerHTML=""

history.forEach(h=>{

let li=document.createElement("li")

li.innerText=h

ul.appendChild(li)

})

}

function selectPlayers(){

let A=document.getElementById("teamA").value
let B=document.getElementById("teamB").value

match.teamA=A
match.teamB=B

showPage("players")

}

function startToss(){

showPage("toss")

}

function startMatch(){

match.scoreA=0
match.scoreB=0
match.wkA=0
match.wkB=0
match.overs=0
match.innings=1

showPage("live")

updateScore()

}

function updateScore(){

let scoreText = match.innings==1
? `${match.teamA} ${match.scoreA}/${match.wkA}`
: `${match.teamB} ${match.scoreB}/${match.wkB}`

document.getElementById("score").innerText=scoreText

document.getElementById("overs").innerText=`Overs ${match.overs}/10`

}

function updateOver(){

let r=parseInt(document.getElementById("runsOver").value)||0
let w=parseInt(document.getElementById("wktsOver").value)||0

if(match.innings==1){

match.scoreA+=r
match.wkA+=w

}else{

match.scoreB+=r
match.wkB+=w

}

match.overs++

updateScore()

}

function endInnings(){

if(match.innings==1){

match.innings=2
match.overs=0

}else{

finishMatch()

}

}

function finishMatch(){

let winner = match.scoreA>match.scoreB ? match.teamA : match.teamB
let loser = match.scoreA>match.scoreB ? match.teamB : match.teamA

table[winner].wins++
table[winner].points+=2
table[winner].played++

table[loser].loss++
table[loser].played++

history.push(`${match.teamA} ${match.scoreA} vs ${match.teamB} ${match.scoreB} → ${winner} won`)

showPage("home")

}

teams.forEach(t=>{

let opt=document.createElement("option")
opt.text=t.name
teamA.add(opt)

let opt2=document.createElement("option")
opt2.text=t.name
teamB.add(opt2)

})

renderTable()

</script>

</body>
</html>
